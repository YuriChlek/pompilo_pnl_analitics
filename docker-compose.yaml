services:
  postgres:
    container_name: pompilo_db
    image: postgres:16-alpine
    restart: always
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - pompilo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pompilo_redis
    ports:
      - "${REDIS_PORT}:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - pompilo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: pompilo_api
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./api/.env
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLIENT_ORIGIN: https://localhost
    ports:
      - "3000:3000"
    networks:
      - pompilo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/swagger').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  client:
    container_name: pompilo_client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://localhost
        NEXT_PUBLIC_API_PORT: 443
        API_BASE_URL: http://api:3000
    restart: always
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ./client/.env
    environment:
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: https://localhost
      NEXT_PUBLIC_API_PORT: 443
      API_BASE_URL: http://api:3000
    networks:
      - pompilo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  gateway:
    container_name: pompilo_gateway
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    restart: always
    depends_on:
      client:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - pompilo
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--spider", "-q", "https://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data

networks:
  pompilo:
    driver: bridge
