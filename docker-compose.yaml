services:
  postgres:
    container_name: pompilo_db
    image: postgres:16-alpine
    restart: always
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - pompilo

  redis:
    image: redis:7-alpine
    container_name: pompilo_redis
    ports:
        - "${REDIS_PORT}:6379"
    command: >
        redis-server
        --appendonly yes
        --appendfsync everysec
    volumes:
        - redis_data:/data
    restart: always

volumes:
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data

networks:
  pompilo:
    driver: bridge
